<!DOCTYPE html>
<html lang="ja">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>本別コンクリート</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #333;
    }

    header {
      background: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .hero {
      background: url("https://images.unsplash.com/photo-1581092919537-4c9e7f9b3c7e") center/cover;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 28px;
      font-weight: bold;
    }

    section {
      padding: 40px 20px;
      max-width: 1000px;
      margin: auto;
    }

    h2 {
      border-left: 5px solid #007BFF;
      padding-left: 10px;
    }

    .services {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      flex: 1;
      min-width: 250px;
      border: 1px solid #ddd;
      padding: 20px;
      border-radius: 10px;
    }

    .contact {
      background: #007BFF;
      color: white;
      text-align: center;
      padding: 30px;
      border-radius: 10px;
    }

    footer {
      background: #111;
      color: #fff;
      text-align: center;
      padding: 10px;
      font-size: 12px;
    }
  </style>
</head>

<div class="hero">
  信頼されるコンクリート施工

<img src="tes.jpeg">

    </div>
    <div class="card">
      <h3>外構工事</h3>
      <p>駐車場やアプローチなど幅広く対応。</p>
    </div>
    <div class="card">
      <h3>土間コンクリート</h3>
      <p>耐久性の高い仕上がりを提供します。</p>
    </div>
  </div>
</section>

<section>

  <p>札幌市内を中心に多数の施工実績があります。</p>
</section>

<section>

  <p>所在地：北海道札幌市</p>
  <p>TEL：090-xxxx-xxxx</p>

<section>
  <div class="contact">
    <h2>お問い合わせ</h2>
    <p>お気軽にご相談ください</p>
    <p>📞 090-xxxx-xxxx</p>
  </div>

<footer>
  © 2026 〇〇コンクリート
